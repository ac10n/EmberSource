<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Podcast App</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #38bdf8;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #1f2937 0%, var(--bg) 60%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(92vw, 420px);
        background: var(--card);
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        letter-spacing: 0.3px;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.5;
      }
      .actions {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }
      a.button {
        text-decoration: none;
        text-align: center;
        padding: 12px 16px;
        border-radius: 10px;
        font-weight: 600;
        border: 1px solid transparent;
      }
      .primary {
        background: var(--accent);
        color: #0b1220;
      }
      .secondary {
        background: transparent;
        border-color: #334155;
        color: var(--text);
      }
      .footer {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome to Podcast App</h1>
      <p>Sign in to continue, or create a new account.</p>
      <div class="actions">
        <a class="button primary" href="app://login">Login</a>
        <a class="button secondary" href="app://register">Create account</a>
      </div>
      <div class="footer">Email confirmation is required after registration.</div>
    </div>
  </body>
</html>
