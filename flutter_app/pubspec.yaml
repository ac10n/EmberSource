name: podcast_app
description: A mobile-first podcast application with web support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  dio: ^5.4.3
  http: ^1.2.1
  
  # Firebase
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  
  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.0.0
  
  # Environment Variables
  flutter_dotenv: ^6.0.0
  
  # Image Handling
  cached_network_image: ^3.3.1
  
  # Audio Player
  audioplayers: ^6.0.0
  
  # JSON Serialization
  json_annotation: ^4.9.0

  # External links
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.2
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/auth_landing.html
  
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
