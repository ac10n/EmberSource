<div class="page">
    <div class="card">
        <h1>Sign in</h1>
        <p class="sub">Use your account to continue</p>

        <form #f="ngForm" (ngSubmit)="onSubmit(f.valid)" novalidate>
            <label>
                <span>Username</span>
                <input type="text" name="username" [(ngModel)]="username" required autocomplete="username"
                    #usernameModel="ngModel" [class.invalid]="submitted && usernameModel.invalid"
                    placeholder="yourname@example.com" />
                @if (submitted && usernameModel.invalid) {
                <small class="error">
                    Username is required
                </small>
                }
            </label>

            <label>
                <span>Password</span>
                <input type="password" name="password" [(ngModel)]="password" required autocomplete="current-password"
                    #passwordModel="ngModel" [class.invalid]="submitted && passwordModel.invalid"
                    placeholder="••••••••" />
                @if (submitted && passwordModel.invalid) {
                <small class="error">
                    Password is required
                </small>
                }
            </label>

            <label class="remember">
                <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe" />
                <span>Remember me on this machine</span>
            </label>

            <button type="submit" [disabled]="loading">
                {{ loading ? 'Signing in…' : 'Sign in' }}
            </button>

            @if (errorText) {
            <p class="error-banner">
                {{ errorText }}
            </p>
            }
        </form>
    </div>
</div>
