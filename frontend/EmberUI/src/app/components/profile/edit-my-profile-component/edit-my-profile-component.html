<div class="page">
    <div class="card">
        <h1>Edit My Profile</h1>

        <form #f="ngForm" (ngSubmit)="onSubmit(f.valid)" novalidate>
            <label>
                <span>Full Name</span>
                <input type="text" name="fullName" [(ngModel)]="fullName" required #fullNameModel="ngModel"
                    [class.invalid]="submitted() && fullNameModel.invalid" placeholder="Your Full Name" />
                @if (submitted() && fullNameModel.invalid) {
                <small class="error">
                    Full Name is required
                </small>
                }
            </label>

            <label>
                <span>Birth Year</span>
                <input type="number" name="birthYear" [(ngModel)]="birthYear" required #birthYearModel="ngModel"
                    [class.invalid]="submitted() && birthYearModel.invalid" placeholder="e.g., 1990" />
                @if (submitted() && birthYearModel.invalid) {
                <small class="error">
                    Birth Year is required
                </small>
                }
            </label>

            <label>
                <span>Jurisdiction</span>
                <input type="text" name="jurisdiction" [(ngModel)]="jurisdiction" required #jurisdictionModel="ngModel"
                    [class.invalid]="submitted() && jurisdictionModel.invalid" placeholder="Your Jurisdiction" />
                @if (submitted() && jurisdictionModel.invalid) {
                <small class="error">
                    Jurisdiction is required
                </small>
                }
            </label>

            <label>
                <span>Changing Password</span>
                <input type="password" name="oldPassword" [(ngModel)]="oldPassword" #oldPasswordModel="ngModel"
                    autocomplete="old-password-disabled" [class.invalid]="submitted() && oldPasswordModel.invalid"
                    placeholder="Only If You want to Change your password" />
                <input type="password" name="newPassword" [(ngModel)]="newPassword" #newPasswordModel="ngModel"
                    autocomplete="new-password-disabled" [class.invalid]="submitted() && newPasswordModel.invalid"
                    placeholder="Only If You want to Change your password" />
                <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword"
                    autocomplete="confirm-new-password-disabled" #confirmPasswordModel="ngModel"
                    [class.invalid]="submitted() && confirmPasswordModel.invalid"
                    placeholder="Confirm your new password" />
                @if (submitted() && confirmPasswordModel.invalid) {
                <small class="error">
                    Confirm Password should match New Password
                </small>
                }
            </label>

            <button type="submit" [disabled]="loading()">
                {{ loading() ? 'Saving…' : 'Save Changes' }}
            </button>
        </form>

        <button type="button" [disabled]="loading()" (click)="logout()">
            Log out
        </button>
        
    </div>
</div>
